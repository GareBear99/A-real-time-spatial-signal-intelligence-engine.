
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ARC v10 Spatial Signal Engine</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<style>
html,body,#map{height:100%;margin:0;background:#000}
#ui{
position:absolute;top:10px;left:10px;background:#111;color:#0f0;
padding:10px;font-family:monospace;z-index:999;width:220px
}
button{width:100%;margin-top:4px}
canvas{position:absolute;top:0;left:0;pointer-events:none}
</style>
</head>
<body>

<div id="ui">
<b>ARC v10 Engine</b><br>
<button onclick="startSim()">Start Signals</button>
<button onclick="stopSim()">Stop</button>
<button onclick="toggleSensors()">Sensors</button>
<button onclick="togglePath()">Paths</button>
<button onclick="runRoomInference()">Infer Rooms</button>
<div id="stats"></div>
</div>

<div id="map"></div>
<canvas id="rf"></canvas>

<script src="arc/bus.js"></script>
<script src="arc/entities.js"></script>
<script src="arc/simulator.js"></script>
<script src="arc/triangulation.js"></script>
<script src="arc/map.js"></script>
<script src="arc/sensors.js"></script>
<script src="arc/webgl_rf.js"></script>
<script src="arc/room_inference.js"></script>

<script>
initMap()
initRF()
</script>

</body>
</html>
